<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VYPE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 50px 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 38px;
      margin-bottom: 8px;
      letter-spacing: 3px;
    }
    p {
      color: #bbbbbb;
      margin-bottom: 35px;
      font-size: 17px;
    }
    .btn {
      display: block;
      background: white;
      color: black;
      text-decoration: none;
      padding: 16px;
      margin: 15px 0;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
    }
    .btn:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>VYPE</h1>
    <p>تابعنا على وسائل التواصل</p>
    
    <a class="btn" href="https://www.instagram.com/vype_studio/" target="_blank">
      Instagram
    </a>
    
    <a class="btn" href="https://www.tiktok.com/@vypestudio" target="_blank">
      TikTok
    </a>
  </div>
</body>
</html>
