<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VYPE</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #111111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FF5722;
      color: white;
      font-size: 34px;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(255, 87, 34, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 3px;
    }

    .subtitle {
      margin-top: 10px;
      margin-bottom: 30px;
      color: #bdbdbd;
      font-size: 15px;
      line-height: 1.6;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      padding: 16px 18px;
      margin: 14px 0;
      border-radius: 14px;
      font-size: 17px;
      font-weight: bold;
      transition: 0.25s ease;
      border: none;
    }

    .btn-main {
      background: #FF5722;
      color: white;
      box-shadow: 0 8px 22px rgba(255, 87, 34, 0.25);
    }

    .btn-main:hover {
      background: #ff6a3a;
      transform: translateY(-2px);
    }

    .btn-dark {
      background: #1f1f1f;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-dark:hover {
      background: #2a2a2a;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 24px;
      color: #8d8d8d;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
   <div class="logo">VYPE</div>
    <h1>VYPE</h1>
    <div class="subtitle">
      Follow us on social media
    </div>

    <a class="btn btn-main" href="https://www.instagram.com/vype_studio/" target="_blank">
      Instagram
    </a>

    <a class="btn btn-dark" href="https://www.tiktok.com/@vypestudio" target="_blank">
      facebook
    </a>

    <a class="btn btn-dark" href="https://www.facebook.com/" target="_blank">
  TikTok
</a>

    <div class="footer">
      © VYPE
    </div>
  </div>
</body>
</html>
